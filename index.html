<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Love & Bunga</title>

<style>

body{
margin:0;
overflow:hidden;
height:100vh;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:linear-gradient(#ffc0cb,#ffe4ec);

font-family:Arial,sans-serif;
}

h1{
color:white;
font-size:55px;

animation:zoom 2s infinite alternate;
}

@keyframes zoom{

from{
transform:scale(1);
}

to{
transform:scale(1.2);
}

}

.heart{

position:relative;

width:120px;
height:120px;

background:red;

transform:rotate(-45deg);

animation:beat 1s infinite;
}

.heart:before,
.heart:after{

content:"";

position:absolute;

width:120px;
height:120px;

background:red;

border-radius:50%;

}

.heart:before{

top:-60px;

left:0;

}

.heart:after{

left:60px;

top:0;

}

@keyframes beat{

0%{
transform:rotate(-45deg) scale(1);
}

50%{
transform:rotate(-45deg) scale(1.15);
}

100%{
transform:rotate(-45deg) scale(1);
}

}

.flower{

position:absolute;

font-size:35px;

animation:fall linear infinite;

}

@keyframes fall{

0%{
transform:translateY(-100px);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(110vh);
opacity:0;
}

}

</style>

</head>

<body>

<h1>I LOVE YOU ❤️</h1>

<div class="heart"></div>

<audio autoplay loop>
<source src="i-love-you-so.mp3" type="audio/mpeg">
</audio>

<script>

function createFlower(){

let flower=document.createElement("div");

flower.classList.add("flower");

flower.innerHTML="🌷";

flower.style.left=Math.random()*100+"vw";

flower.style.animationDuration=
(Math.random()*4+4)+"s";

document.body.appendChild(flower);

setTimeout(()=>{

flower.remove();

},8000);

}

setInterval(createFlower,300);

</script>

</body>

</html>
